services:
  master:
    build: ./app
    container_name: lab3-master
    environment:
      NODE_ROLE: master
      NODE_NAME: master
      PORT: "8080"
      REPLICA_URLS: http://replica1:8080,http://replica2:8080
    ports:
      - "8080:8080"

  replica1:
    build: ./app
    container_name: lab3-replica1
    environment:
      NODE_ROLE: replica
      NODE_NAME: replica1
      PORT: "8080"
    ports:
      - "8081:8080"

  replica2:
    build: ./app
    container_name: lab3-replica2
    environment:
      NODE_ROLE: replica
      NODE_NAME: replica2
      PORT: "8080"
    ports:
      - "8082:8080"
