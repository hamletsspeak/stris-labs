services:
  db:
    image: postgres:16
    container_name: lab2-db
    environment:
      POSTGRES_DB: lab2
      POSTGRES_USER: lab2
      POSTGRES_PASSWORD: lab2
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab2 -d lab2"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    container_name: lab2-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: ./app
    container_name: lab2-app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: lab2
      DB_USER: lab2
      DB_PASSWORD: lab2
      REDIS_HOST: redis
      REDIS_PORT: "6379"
